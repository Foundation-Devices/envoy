# (05) checkSupportButtonsInSettings
appId: com.foundationdevices.envoy
---

# go to support
- tapOn:
    id: hamburger_menu
- tapOn: |-
    SUPPORT
    SUPPORT

# check the buttons
- tapOn: DOCUMENTATION
- tapOn: Back
- tapOn: COMMUNITY
- tapOn: Back
- tapOn: EMAIL
- tapOn: Back

# go back to home
- tapOn:
    id: hamburger_menu
- tapOn:
    id: hamburger_menu
