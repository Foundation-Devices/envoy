# (05) checkSupportButtonsInSettings
appId: com.foundationdevices.envoy
---

# go to support
- tapOn:
    id: hamburger_menu
- tapOn: |-
    SUPPORT
    SUPPORT

# check the buttons
- tapOn: DOCUMENTATION
- pressKey: back
- swipe:
     start: "50%, 5%"
     end: "50%, 5%"
     duration: 3000

- tapOn: COMMUNITY
- pressKey: back
- swipe:
     start: "50%, 5%"
     end: "50%, 5%"
     duration: 3000

- assertVisible: EMAIL # just check for the button

# go back to home
- tapOn:
    id: hamburger_menu
- tapOn:
    id: hamburger_menu
