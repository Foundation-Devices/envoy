# (08) videosLearnPage ( and enableTorAndCheckShield test)
appId: com.foundationdevices.envoy
---

# go to learn
- tapOn: Learn

# make sure videos show up
- assertVisible: "video card.*"

# enter in a video
- tapOn: "video card.*"

# make sure the video started
- assertNotVisible: "video card.*"
- assertNotVisible: |-
    LEARN
    off

# test the player
# pause
- runFlow:
    when:
      notVisible: "Play"
    commands:
      - tapOn:
          point: 50%,50%

# make sure play is visible
- assertVisible: "Play" # TODO videos do not load, maybe add 15 sec before each test ?

# unpause
# Make controls visible again
- runFlow:
    when:
      notVisible: "back button"
    commands:
      - tapOn:
          point: 50%,50%

# exit the player
- tapOn: back button

# make sure you are back to LEARN
- assertVisible: |-
    LEARN
    off
- assertVisible: "video card.*"

# open the video again
- tapOn: "video card.*"

# Use android's native back to make sure it
# works the same way as the top left back arrow

# swipe to show OS buttons and go back with native back
# retry until we land on the learn page with "Watched"
- repeat:
    while:
      notVisible: ".*Watched"
    commands:
      - swipe:
          start: "100%, 50%"
          end: "97%, 50%"
      - runFlow:
          when:
            visible: Back
          commands:
            - tapOn: Back

- assertVisible: .*Watched

############################# make sure all works over tor

# go to privacy
- tapOn: Privacy

# enable tor
- tapOn: |-
    Improved
    Privacy

# check if Tor connects via top bar Shield icon
- extendedWaitUntil:
    visible: "PRIVACY connected"
    timeout: 300000 # wait for 5 min

# hack to wait 30 sec
- swipe:
    start: "50%, 5%"
    end: "50%, 5%"
    duration: 30000

# check if Tor shield is still blue
- assertVisible: "PRIVACY connected"

# go to learn
- tapOn: Learn

# make sure videos show up
- assertVisible: "video card.*"

# enter in a video
- tapOn: "video card.*"

# make sure the video started
- assertNotVisible: "video card.*"
- assertNotVisible: |-
    LEARN
    off

# wait for the tor video to load (retry once if it times out)
- repeat:
    times: 2
    commands:
      - runFlow:
          when:
            visible: "Envoy is loading your video over the Tor Network"
          commands:
            - extendedWaitUntil:
                notVisible: "Envoy is loading your video over the Tor Network"
                timeout: 60000
                optional: true
            # if still loading after 60s, go back and re-enter the video
            - runFlow:
                when:
                  visible: "Envoy is loading your video over the Tor Network"
                commands:
                  - tapOn: back button
                  - tapOn: "video card.*"

# test the player
# pause
- runFlow:
    when:
      notVisible: "Play"
    commands:
      - tapOn:
          point: 50%,50%

# make sure play is visible
- assertVisible: Play

# unpause
# Make controls visible again
- runFlow:
    when:
      notVisible: "back button"
    commands:
      - tapOn:
          point: 50%,50%

# exit the player
- tapOn: back button

# make sure you are back to LEARN
- assertVisible: |-
    LEARN
    connected
- assertVisible: "video card.*"

# open the video again
- tapOn: "video card.*"

# wait for the tor video to load (retry once if it times out)
- repeat:
    times: 2
    commands:
      - runFlow:
          when:
            visible: "Envoy is loading your video over the Tor Network"
          commands:
            - extendedWaitUntil:
                notVisible: "Envoy is loading your video over the Tor Network"
                timeout: 60000
                optional: true
            # if still loading after 60s, go back and re-enter the video
            - runFlow:
                when:
                  visible: "Envoy is loading your video over the Tor Network"
                commands:
                  - tapOn: back button
                  - tapOn: "video card.*"

# Use android's native back to make sure it
# works the same way as the top left back arrow

# swipe to show OS buttons and go back with native back
# retry until we land on the learn page with "Watched"
- repeat:
    while:
      notVisible: ".*Watched"
    commands:
      - swipe:
          start: "100%, 50%"
          end: "97%, 50%"
      - runFlow:
          when:
            visible: Back
          commands:
            - tapOn: Back

- assertVisible: .*Watched

# turn the tor off for another test
- tapOn: Privacy

# if it is connected turn it off
- tapOn: |-
    Better 
    Performance

# check if it is OFF via shield
- extendedWaitUntil:
    visible: "PRIVACY off"
    timeout: 300000 # wait for 5 min

# go back to home
- tapOn: Accounts
