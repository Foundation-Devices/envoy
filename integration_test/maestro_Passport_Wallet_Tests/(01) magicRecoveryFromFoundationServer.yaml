- inputText: "bacon"
- tapOn: "10. "
- inputText: "bacon"
- tapOn: "11. "
- inputText: "bacon"
- tapOn: "12. "
- inputText: "bacon"

- tapOn: Enter Your Seed
- tapOn: Done

# Check that error popup shows up
- assertVisible: That seed appears to be invalid. Please check the words entered, including the order they are in and try again.
- tapOn: Back

- extendedWaitUntil:
    visible: Back button - Seed
    timeout: 5000

# back to seed menu
- tapOn: Back button - Seed

