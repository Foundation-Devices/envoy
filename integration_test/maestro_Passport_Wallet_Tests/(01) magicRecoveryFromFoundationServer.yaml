###### 12 word valid seed test #####

# Insert seed words (12 word)
- tapOn: 12 Word Seed
- tapOn: "1. "
- inputText: "ripple"
- tapOn: "2. "
- inputText: "bomb"
- tapOn: "3. "
- inputText: "rich"
- tapOn: "4. "
- inputText: "talent"
- tapOn: "5. "
- inputText: "cloth"
- tapOn: "6. "
- inputText: "food"
- tapOn: "7. "
- inputText: "nation"
- tapOn: "8. "
- inputText: "trouble"
- tapOn: "9. "
- inputText: "section"
- tapOn: "10. "
- inputText: "lend"
- tapOn: "11. "
- inputText: "energy"
- tapOn: "12. "
- inputText: "head"
- tapOn: Done

- extendedWaitUntil:
    visible: Magic Backup Detected
    timeout: 30000 # timeout 30 s

# ignore button
- tapOn:
    id: PopUp Secondary Button

- extendedWaitUntil:
    visible: "Import Envoy Backup File"
    timeout: 300000 # timeout 5 min

# Press on the icon to load backup file
- longPressOn: |-
    Import Backup Image

- extendedWaitUntil:
    visible: "Your Mobile Wallet Is Ready"
    timeout: 300000 # timeout 5 min
- tapOn: Continue

# Make sure you are in Home
- assertVisible: ACCOUNTS

# turn Testnet and Signet OFF and ON for the right account order

# go to advanced
- tapOn:
    id: hamburger_menu
- tapOn: |-
    SETTINGS
    SETTINGS
- tapOn: Advanced

# turn them off
- tapOn:
    id: Testnet Toggle-true
- tapOn:
    id: Signet Toggle-true

# refresh the page
- tapOn:
    id: hamburger_menu
- tapOn: |-
    SETTINGS
    SETTINGS
- tapOn: Advanced

# turn them ON again
- tapOn:
    id: Testnet Toggle-false
- tapOn: Continue

- tapOn:
    id: Signet Toggle-false
- tapOn:
    id: signet_modal_continue


# go back to home
- tapOn:
    id: hamburger_menu
- tapOn:
    id: hamburger_menu
