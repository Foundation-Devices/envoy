# (01) magicRecoveryFromFoundationServer ( and ENV-2315)
appId: com.foundationdevices.envoy
---
- launchApp:
    clearState: true

# Go to Advanced
- tapOn: Advanced

# Turn off Magic Backup
- tapOn: magic backup
- tapOn:
    id: PopUp Secondary Button
- tapOn: Back
- tapOn: |-
    Create a 
    Mobile Wallet
- tapOn: Recover
###### 12 word err test ENV-2315 #####

# Insert seed words (12 word)
- tapOn: 12 Word Seed
- tapOn: "1. "
- inputText: "bacon"
- tapOn: "2. "
- inputText: "bacon"
- tapOn: "3. "
- inputText: "bacon"
