# (28) logsFreeze
appId: com.foundationdevices.envoy
---

# go to advanced / logs
- tapOn:
    id: hamburger_menu
- tapOn: |-
    SETTINGS
    SETTINGS
- tapOn: Advanced
- tapOn: View Envoy Logs

# copy logs
- tapOn: Copy logs

# check for the toast
- assertVisible: Logs copied to clipboard

- tapOn: Back

# go back to home
- tapOn:
    id: hamburger_menu
