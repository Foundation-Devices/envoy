# (01) primeOnboarding
appId: com.foundationdevices.envoy
---

# TODO: please set the lock time to Never on the Prime for this test to work
# On the PRIME side you need to be in HOME (DEV app version installed)
# Also this test is adjusted for MOTOROLA only

- launchApp:
    clearState: true

# "Skip prime security check"
- tapOn: "ENVOY"
- tapOn: "ENVOY"
- tapOn: "Reclaim your sovereignty with Envoy, a simple Bitcoin wallet with powerful account management and privacy features."
- tapOn: "Reclaim your sovereignty with Envoy, a simple Bitcoin wallet with powerful account management and privacy features."
- tapOn: "ENVOY"
- tapOn: "ENVOY"
- longPressOn: "ENVOY"

# PRIME: open menu (bottom-left hamburger on home)
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env:
      X: "40"
      Y: "740"

# wait for Prime to enter menu
- runScript:
    file: prime_scripts/helpers/prime_assert_visible.js
    env:
      TEXT: "Settings"
      TIMEOUT_S: "10"

# PRIME: tap "Settings" row (under the General section)
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env:
      X: "240"
      Y: "320"

# PRIME: tap "Advanced"
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env:
      X: "240"
      Y: "552"

# PRIME: tap "Erase Device"
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env:
      X: "240"
      Y: "226"

# PRIME: tap "I Understand" checkbox
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env:
      X: "240"
      Y: "612"

# PRIME: tap "Erase" (destructive — wipes the device)
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env:
      X: "240"
      Y: "739"

# ERASE
# PRIME: tap at (50%, 95%) → (240, 740)
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env:
      X: "240"
      Y: "740"

# CONTINUE
# PRIME: tap at (50%, 95%) → (240, 740)
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env:
      X: "240"
      Y: "740"

# ERASE
# PRIME: tap at (50%, 95%) → (240, 740)
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env:
      X: "240"
      Y: "740"

# wait for Prime to reset — full erase + reboot + USB re-enumeration can
# take ~30-50s. Helper tolerates the USB outage in the middle.
- runScript:
    file: prime_scripts/helpers/prime_assert_visible.js
    env:
      TEXT: "Welcome to Passport Prime"
      TIMEOUT_S: "60"

# Delete Prime from motorola ble IF THERE IS ONE
# forget the Prime (MOTOROLA ONLY FLOW)
- swipe:
    start: "50%, 1%"
    end: "50%, 80%"
    duration: 500

- tapOn: "Bluetooth"

# If "Passport Prime (XXXX)" is on screen → forget the device
- runFlow:
    when:
      notVisible: "Passport Prime .*"
    commands:
      - tapOn: "Done"
      - tapOn: "Back"

- runFlow:
    when:
      visible: "Passport Prime .*"
    commands:
      - tapOn:
          id: "gear_icon_image"
      - tapOn: "Forget"
      - tapOn: "Forget device"

- tapOn: "Set Up a \nPassport Device"

- runFlow:
    when:
      visible: "While using the app"
    commands:
      - tapOn: "While using the app"

# KEBAB: turn on the kebab to "phone scans Prime" position
- runScript:
    file: kebab_scripts/kebab.js
    env:
      KEBAB_COMMAND: "iphone_scan_prime"

# GET STARTED button
# PRIME: tap at (50%, 95%) → (240, 740)
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env:
      X: "240"
      Y: "740"

# wait for the first Envoy QR scan
- swipe:
    start: "50%, 5%"
    end: "50%, 5%"
    duration: 10000

- tapOn: "Continue"

- tapOn: "Connect with QuantumLink"

# allow ble and pair
- tapOn: "Allow"

- runFlow:
    when:
      visible: "Pair"
    commands:
      - tapOn: "Pair"

# wait for second Envoy QR scan
- swipe:
    start: "50%, 5%"
    end: "50%, 5%"
    duration: 20000

# KEBAB: face both phones towards tester
- runScript:
    file: kebab_scripts/kebab.js
    env:
      KEBAB_COMMAND: "face_tester_2"

# PRIME: wait for ALL CHECKS
- runScript:
    file: prime_scripts/helpers/prime_assert_visible.js
    env:
      TEXT: "Continue"
      TIMEOUT_S: "10"

# CONTINUE button
# PRIME: tap at (50%, 95%) → (240, 740)
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env:
      X: "240"
      Y: "740"

# CONTINUE button
# PRIME: tap at (50%, 95%) → (240, 740)
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env:
      X: "240"
      Y: "740"

# wait for pass screen
- runScript:
    file: prime_scripts/helpers/prime_assert_visible.js
    env:
      TEXT: "Create PIN"
      TIMEOUT_S: "10"

# MAKE NEW PIN

# PRIME: enter PIN "123456"
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env: { X: "80",  Y: "520" }   # 1
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env: { X: "240", Y: "520" }   # 2
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env: { X: "400", Y: "520" }   # 3
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env: { X: "80",  Y: "600" }   # 4
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env: { X: "240", Y: "600" }   # 5
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env: { X: "400", Y: "600" }   # 6

# PRIME: tap Done
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env: { X: "400", Y: "740" }


# VERIFY NEW PIN

# PRIME: enter PIN "123456"
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env: { X: "80",  Y: "520" }   # 1
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env: { X: "240", Y: "520" }   # 2
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env: { X: "400", Y: "520" }   # 3
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env: { X: "80",  Y: "600" }   # 4
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env: { X: "240", Y: "600" }   # 5
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env: { X: "400", Y: "600" }   # 6

# PRIME: tap Done
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env: { X: "400", Y: "740" }

# DONE button
# PRIME: tap at (50%, 95%) → (240, 740)
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env:
      X: "240"
      Y: "740"


# Create master key:

# CREATE MASTER KEY
# PRIME: tap at (50%, 95%) → (240, 740)
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env:
      X: "240"
      Y: "740"

# CONTINUE
# PRIME: tap at (50%, 95%) → (240, 740)
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env:
      X: "240"
      Y: "740"

# wait until master key generation actually completes (crypto work can
# take 10s+) — anchoring on the unique "Master Key Created" title instead
# of the generic "Continue" word that appears on many screens.
- runScript:
    file: prime_scripts/helpers/prime_assert_visible.js
    env:
      TEXT: "Master Key Created"
      TIMEOUT_S: "30"

# CONTINUE
# PRIME: tap at (50%, 95%) → (240, 740)
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env:
      X: "240"
      Y: "740"

# PRIME: tap "Advanced" (top-right)
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env:
      X: "425"
      Y: "55"

# VIEW SEED WORDS button
# PRIME: tap at (50%, 95%) → (240, 740)
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env:
      X: "240"
      Y: "740"

# PRIME: tap Continue
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env:
      X: "240"
      Y: "620"

# wait for seed words screen
- runScript:
    file: prime_scripts/helpers/prime_assert_visible.js
    env:
      TEXT: "Seed Words"
      TIMEOUT_S: "10"

# PRIME: OCR the Seed Words screen → exposes ${output.seed_1} .. ${output.seed_12}
- runScript:
    file: prime_scripts/helpers/prime_seeds.js

# PRIME: tap Verify (bottom button on the Seed Words screen)
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env:
      X: "240"
      Y: "745"

# wait for the Verify quiz screen to appear
- swipe:
    start: "50%, 5%"
    end: "50%, 5%"
    duration: 1500

# VERIFY SEED WORDS:

# PRIME: solve the 4 verify-rounds (each round: OCR "#N" → tap correct word → tap bottom button)
- runScript:
    file: prime_scripts/helpers/prime_verify_step.js
- runScript:
    file: prime_scripts/helpers/prime_verify_step.js
- runScript:
    file: prime_scripts/helpers/prime_verify_step.js
- runScript:
    file: prime_scripts/helpers/prime_verify_step.js

# PRIME: tap CONTINUE
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env:
     X: "240"
     Y: "620"

# wait for Account
- runScript:
    file: prime_scripts/helpers/prime_assert_visible.js
    env:
      TEXT: "Finish"
      TIMEOUT_S: "10"

# PRIME: tap Finish
- runScript:
    file: prime_scripts/interactions/prime_tap.js
    env:
      X: "240"
      Y: "745"

# wait for Account on Envoy
- extendedWaitUntil:
    visible: "ACCOUNTS"
    timeout: 30000

# ENVOY: go trough the Quiz
- tapOn: "Next"
- tapOn: "Done"
